name: iOS Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout codice
      uses: actions/checkout@v4
      
    - name: Setup Flutter (ULTIMA VERSIONE STABILE)
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
        
    - name: Verifica versioni
      run: |
        flutter --version
        dart --version
      
    - name: Installa dipendenze
      run: flutter pub get
      
    - name: Inizializza piattaforma iOS
      run: flutter create --platforms=ios .
      
    - name: Crea Podfile manualmente se manca
      run: |
        if [ ! -f ios/Podfile ]; then
          echo "Podfile non trovato, lo creo manualmente..."
          cat > ios/Podfile << 'EOF'
        platform :ios, '12.0'
        
        ENV['COCOAPODS_DISABLE_STATS'] = 'true'
        
        project 'Runner', {
          'Debug' => :debug,
          'Profile' => :release,
          'Release' => :release,
        }
        
        def flutter_root
          generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
          unless File.exist?(generated_xcode_build_settings_path)
            raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
          end
        
          File.foreach(generated_xcode_build_settings_path) do |line|
            matches = line.match(/FLUTTER_ROOT\=(.*)/)
            return matches[1].strip if matches
          end
          raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig, then run flutter pub get"
        end
        
        require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)
        
        flutter_ios_podfile_setup
        
        target 'Runner' do
          use_frameworks!
          use_modular_headers!
        
          flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
        end
        
        post_install do |installer|
          installer.pods_project.targets.each do |target|
            flutter_additional_ios_build_settings(target)
          end
        end
        EOF
          echo "Podfile creato con successo"
        else
          echo "Podfile già esistente"
        fi
      
    - name: Verifica struttura iOS
      run: |
        ls -la ios/
        echo "---"
        cat ios/Podfile
      
    - name: Configura iOS
      run: |
        cd ios
        pod install --repo-update
        cd ..
        
    - name: Build iOS (senza firma)
      run: flutter build ios --release --no-codesign
      
    - name: Crea archivio IPA
      run: |
        cd build/ios/iphoneos
        mkdir Payload
        cd Payload
        ln -s ../Runner.app
        cd ..
        zip -r app.ipa Payload
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: build/ios/iphoneos/app.ipa
        retention-days: 30
